<nav aria-label="navegación principal">
  <!-- MÓVIL -->
  <div class="nav-mobile">
    <div class="nav-top">
      <a
        routerLink="/convocatorias"
        class="nav-logo"
        aria-label="Pistalibre - ir a inicio"
        >pistalibre</a
      >
      <ng-container *ngIf="isAuthenticated$ | async; else guestTopMobile">
        <button (click)="onLogout()" aria-label="cerrar sesión">
          cerrar sesión
        </button>
      </ng-container>
      <ng-template #guestTopMobile>
        <a routerLink="/login" routerLinkActive="active">iniciar sesión</a>
      </ng-template>
    </div>
    <div class="nav-bottom">
      <a routerLink="/convocatorias" routerLinkActive="active">convocatorias</a>
      <ng-container *ngIf="isAuthenticated$ | async">
        <ng-container *ngIf="userTipo$ | async as tipo">
          <a
            *ngIf="tipo !== 'institucion'"
            routerLinkActive="active"
            [routerLink]="tipo === 'admin' ? '/admin' : '/perfil'"
          >
            mi perfil<span
              *ngIf="tipo === 'artista' && (tieneFavoritosUrgentes$ | async)"
              class="notif-asterisco"
              aria-label="tienes convocatorias urgentes"
              >&nbsp;*</span
            >
          </a>
          <ng-container *ngIf="tipo === 'institucion'">
            <a
              routerLink="/institucion-dashboard"
              [class.active]="isPerfilInstitucionActivo"
              >mi perfil</a
            >
            <a
              routerLink="/institucion-dashboard"
              [queryParams]="tabNueva"
              [class.active]="isPublicarActivo"
              >publicar</a
            >
          </ng-container>
        </ng-container>
      </ng-container>
      <ng-container *ngIf="!(isAuthenticated$ | async)">
        <a routerLink="/login">publicar</a>
      </ng-container>
    </div>
  </div>

  <!-- DESKTOP -->
  <div class="nav-desktop">
    <a
      routerLink="/convocatorias"
      class="nav-logo"
      aria-label="Pistalibre - ir a inicio"
      >pistalibre</a
    >
    <div class="nav-links">
      <a routerLink="/convocatorias" routerLinkActive="active">convocatorias</a>
      <ng-container *ngIf="isAuthenticated$ | async; else guestDesktop">
        <ng-container *ngIf="userTipo$ | async as tipo">
          <a
            *ngIf="tipo !== 'institucion'"
            routerLinkActive="active"
            [routerLink]="tipo === 'admin' ? '/admin' : '/perfil'"
          >
            mi perfil<span
              *ngIf="tipo === 'artista' && (tieneFavoritosUrgentes$ | async)"
              class="notif-asterisco"
              aria-label="tienes convocatorias urgentes"
              >&nbsp;*</span
            >
          </a>
          <ng-container *ngIf="tipo === 'institucion'">
            <a
              routerLink="/institucion-dashboard"
              [class.active]="isPerfilInstitucionActivo"
              >mi perfil</a
            >
            <a
              routerLink="/institucion-dashboard"
              [queryParams]="tabNueva"
              [class.active]="isPublicarActivo"
              >publicar</a
            >
          </ng-container>
          <button (click)="onLogout()" aria-label="cerrar sesión">
            cerrar sesión
          </button>
        </ng-container>
      </ng-container>
      <ng-template #guestDesktop>
        <a routerLink="/login">publicar</a>
        <a routerLink="/login" routerLinkActive="active">iniciar sesión</a>
      </ng-template>
    </div>
  </div>

  <hr aria-hidden="true" />
</nav>
