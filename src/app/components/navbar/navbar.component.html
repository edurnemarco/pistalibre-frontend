<nav aria-label="navegación principal">
  <!-- MÓVIL: dos líneas -->
  <div class="nav-mobile">
    <div class="nav-top">
      <a
        routerLink="/oportunidades"
        class="nav-logo"
        aria-label="Pistalibre - ir a inicio"
        >pistalibre</a
      >
      <ng-container *ngIf="isAuthenticated$ | async; else guestTopMobile">
        <button (click)="onLogout()" aria-label="cerrar sesión">
          cerrar sesión
        </button>
      </ng-container>
      <ng-template #guestTopMobile>
        <a routerLink="/login" aria-label="iniciar sesión">iniciar sesión</a>
      </ng-template>
    </div>
    <div class="nav-bottom">
      <a routerLink="/oportunidades" aria-label="ver oportunidades"
        >oportunidades</a
      >
      <ng-container *ngIf="isAuthenticated$ | async; else guestBottomMobile">
        <a routerLink="/publicar" aria-label="publicar convocatoria"
          >publicar</a
        >
      </ng-container>
      <ng-template #guestBottomMobile>
        <a routerLink="/publicar" aria-label="publicar convocatoria"
          >publicar</a
        >
      </ng-template>
    </div>
  </div>

  <!-- DESKTOP: una línea -->
  <div class="nav-desktop" role="navigation">
    <a
      routerLink="/oportunidades"
      class="nav-logo"
      aria-label="Pistalibre - ir a inicio"
      >pistalibre</a
    >
    <div class="nav-links">
      <a routerLink="/oportunidades">oportunidades</a>
      <ng-container *ngIf="isAuthenticated$ | async; else guestDesktop">
        <a routerLink="/perfil">mi perfil</a>
        <a routerLink="/publicar">publicar</a>
        <span class="nav-user" aria-label="usuario autenticado">{{
          (user$ | async)?.nombre
        }}</span>
        <button (click)="onLogout()" aria-label="cerrar sesión">
          cerrar sesión
        </button>
      </ng-container>
      <ng-template #guestDesktop>
        <a routerLink="/publicar">publicar</a>
        <a routerLink="/login">iniciar sesión</a>
      </ng-template>
    </div>
  </div>

  <hr aria-hidden="true" />
</nav>
