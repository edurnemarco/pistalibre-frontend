<nav aria-label="navegación principal">
  <!-- MÓVIL -->
  <div class="nav-mobile">
    <div class="nav-top">
      <a
        routerLink="/oportunidades"
        class="nav-logo"
        aria-label="Pistalibre - ir a inicio"
        >pistalibre</a
      >
      <ng-container *ngIf="isAuthenticated$ | async; else guestTopMobile">
        <button (click)="onLogout()" aria-label="cerrar sesión">
          cerrar sesión
        </button>
      </ng-container>
      <ng-template #guestTopMobile>
        <a routerLink="/login">iniciar sesión</a>
      </ng-template>
    </div>
    <div class="nav-bottom">
      <a routerLink="/oportunidades">oportunidades</a>
      <ng-container *ngIf="isAuthenticated$ | async">
        <ng-container *ngIf="userTipo$ | async as tipo">
          <a routerLink="/perfil">mi perfil</a>
          <a *ngIf="tipo === 'institucion'" routerLink="/publicar">publicar</a>
        </ng-container>
      </ng-container>
      <ng-container *ngIf="!(isAuthenticated$ | async)">
        <a routerLink="/publicar">publicar</a>
      </ng-container>
    </div>
  </div>

  <!-- DESKTOP -->
  <div class="nav-desktop">
    <a
      routerLink="/oportunidades"
      class="nav-logo"
      aria-label="Pistalibre - ir a inicio"
      >pistalibre</a
    >
    <div class="nav-links">
      <a routerLink="/oportunidades">oportunidades</a>
      <ng-container *ngIf="isAuthenticated$ | async; else guestDesktop">
        <ng-container *ngIf="userTipo$ | async as tipo">
          <a routerLink="/perfil">
            mi perfil<span
              *ngIf="tieneFavoritosUrgentes$ | async"
              class="notif-asterisco"
              aria-label="tienes convocatorias urgentes"
            >
              &nbsp;*</span
            >
          </a>
          <a *ngIf="tipo === 'institucion'" routerLink="/publicar">publicar</a>
          <button (click)="onLogout()" aria-label="cerrar sesión">
            cerrar sesión
          </button>
        </ng-container>
      </ng-container>
      <ng-template #guestDesktop>
        <a routerLink="/publicar">publicar</a>
        <a routerLink="/login">iniciar sesión</a>
      </ng-template>
    </div>
  </div>

  <hr aria-hidden="true" />
</nav>
